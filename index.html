<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1A237E">
<meta name="description" content="Consulta de votação, emendas e indicações por município - Dep. Paulo Mansur">
<title>Consulta Eleitoral - Paulo Mansur</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mansur Consulta">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="app-header">
  <div class="app-header-title">Consulta Eleitoral</div>
  <div class="app-header-sub">Dep. Paulo Mansur | PL-SP</div>
</header>

<main class="container">

  <div class="tabs" id="tabsBar" role="tablist">
    <button class="tab-btn active" data-tab="nome" type="button" role="tab" aria-selected="true">🔍 Por nome</button>
    <button class="tab-btn" data-tab="raio" type="button" role="tab" aria-selected="false">📍 Cidades próximas</button>
  </div>

  <section id="panelNome" class="tab-panel">
    <section class="search-section">
      <div class="search-box" id="searchBox">
        <span class="search-icon">&#128269;</span>
        <input
          id="searchInput"
          type="text"
          inputmode="search"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          placeholder="Buscar município..."
          aria-label="Buscar município"
          aria-expanded="false"
          role="combobox"
          aria-autocomplete="list"
          aria-controls="suggestionsList"
        >
        <button id="clearBtn" class="clear-btn" type="button" aria-label="Limpar busca" hidden>&times;</button>
      </div>
      <ul id="suggestionsList" class="suggestions-list" role="listbox" hidden></ul>
    </section>

    <section id="emptyState" class="empty-state">
      <div class="empty-state-icon">&#127968;</div>
      <p>Digite o nome de um município para consultar votação, emendas e indicações.</p>
      <div class="empty-state-stats" id="globalStats"></div>
    </section>
  </section>

  <section id="panelRaio" class="tab-panel" hidden>
    <section class="radius-controls">
      <p class="radius-intro">Digite um raio (até 150 km) para listar os municípios mais próximos de um ponto de partida.</p>

      <div class="field-label">Ponto de partida</div>
      <div class="origin-toggle" id="originToggle">
        <button class="origin-btn active" data-origin="gps" type="button">📍 Minha localização</button>
        <button class="origin-btn" data-origin="city" type="button">🏙️ Escolher cidade</button>
      </div>

      <div id="originCityBox" class="origin-city-box" hidden>
        <div class="search-box origin-search-box">
          <span class="search-icon">&#128269;</span>
          <input
            id="originCityInput"
            type="text"
            inputmode="search"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="Buscar cidade de partida..."
            aria-label="Cidade de partida"
          >
        </div>
        <ul id="originCitySuggestions" class="suggestions-list" role="listbox" hidden></ul>
        <div id="originCitySelectedChip" class="origin-selected-chip" hidden></div>
      </div>

      <div class="radius-input-row">
        <input id="radiusInput" type="number" inputmode="numeric" min="1" max="150" placeholder="Ex: 50" aria-label="Raio em quilômetros">
        <span class="radius-unit">km</span>
        <button id="radiusSearchBtn" class="radius-search-btn" type="button">Buscar</button>
      </div>
      <div class="radius-chips">
        <button class="chip" data-km="10" type="button">10 km</button>
        <button class="chip" data-km="25" type="button">25 km</button>
        <button class="chip" data-km="50" type="button">50 km</button>
        <button class="chip" data-km="100" type="button">100 km</button>
        <button class="chip" data-km="150" type="button">150 km</button>
      </div>

      <div class="field-label">Ordenar por</div>
      <select id="radiusSortSelect" class="radius-sort-select" aria-label="Ordenar por">
        <option value="dist">Distância (mais perto primeiro)</option>
        <option value="votos">Quantidade de votos (maior primeiro)</option>
        <option value="pct">% de votos válidos (maior primeiro)</option>
      </select>

      <div class="field-label">Filtros</div>
      <div class="radius-filters-row">
        <label class="filter-check"><input type="checkbox" id="filterEmenda"> Somente cidades com emenda</label>
        <label class="filter-check"><input type="checkbox" id="filterIndicacao"> Somente cidades com indicação</label>
      </div>
    </section>

    <div id="radiusStatus" class="radius-status" hidden></div>
    <ul id="radiusResultsList" class="radius-results-list"></ul>
  </section>

  <section id="cityCard" class="city-card" hidden>
    <!-- populated by JS -->
  </section>

</main>

<div id="detailSheet" class="sheet-overlay" hidden>
  <div class="sheet" role="dialog" aria-modal="true">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheetTitle"></h2>
      <button id="sheetClose" class="sheet-close" type="button" aria-label="Fechar">&times;</button>
    </div>
    <div id="sheetBody" class="sheet-body"></div>
  </div>
</div>

<div id="toast" class="toast" hidden></div>

<script src="app.js"></script>
</body>
</html>
